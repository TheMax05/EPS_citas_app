{% extends 'base.html' %}
{% block title %}Registrar Paciente{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Registrar Paciente</h1>
  <p>Completa el formulario con los datos del paciente.</p>
</div>

<div class="form-card">
  <h2>👤 Datos del Paciente</h2>
  <form method="POST" action="{{ url_for('registro_paciente') }}">
    <div class="form-grid">
      <div class="field">
        <label for="documento">Número de Identificación</label>
        <input type="text" id="documento" name="documento" placeholder="Ej: 1020304050" required />
      </div>
      <div class="field">
        <label for="eps">EPS Asignada</label>
        <select id="eps" name="eps" required>
          <option value="">Seleccione una EPS</option>
          <option>Sura</option>
          <option>Sanitas</option>
          <option>Nueva EPS</option>
          <option>Compensar</option>
          <option>Famisanar</option>
          <option>Coosalud</option>
          <option>Otra</option>
        </select>
      </div>
      <div class="field">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Nombres" required />
      </div>
      <div class="field">
        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" name="apellido" placeholder="Apellidos" required />
      </div>
      <div class="field">
        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" name="telefono" placeholder="3001234567" required />
      </div>
      <div class="field">
        <label for="correo">Correo Electrónico</label>
        <input type="email" id="correo" name="correo" placeholder="correo@ejemplo.com" required />
      </div>
    </div>

    <div class="btn-actions">
      <button type="submit" class="btn btn-primary">✅ Registrar Paciente</button>
      <a href="{{ url_for('index') }}" class="btn btn-secondary">← Volver</a>
    </div>
  </form>
</div>
{% endblock %}
