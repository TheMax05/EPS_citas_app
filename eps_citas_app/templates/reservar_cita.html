{% extends 'base.html' %}
{% block title %}Reservar Cita{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Reservar Cita Médica</h1>
  <p>El paciente debe estar registrado previamente en el sistema.</p>
</div>

<div class="form-card">
  <h2>📅 Datos de la Cita</h2>
  <form method="POST" action="{{ url_for('reservar_cita_view') }}">
    <div class="form-grid">
      <div class="field full">
        <label for="documento">Documento del Paciente</label>
        <input type="text" id="documento" name="documento" placeholder="Número de identificación del paciente" required />
      </div>
      <div class="field">
        <label for="medico">Médico Asignado</label>
        <input type="text" id="medico" name="medico" placeholder="Nombre del médico" required />
      </div>
      <div class="field">
        <label for="tipo_cita">Tipo de Cita</label>
        <select id="tipo_cita" name="tipo_cita" required>
          <option value="">Seleccione el tipo</option>
          <option value="General">General</option>
          <option value="Odontología">Odontología</option>
          <option value="Especialista">Especialista</option>
        </select>
      </div>
      <div class="field">
        <label for="fecha">Fecha de la Cita</label>
        <input type="date" id="fecha" name="fecha" required />
      </div>
      <div class="field">
        <label for="hora">Hora de la Cita</label>
        <input type="time" id="hora" name="hora" required />
      </div>
      <div class="field full">
        <label for="direccion_eps">Dirección de la EPS</label>
        <input type="text" id="direccion_eps" name="direccion_eps" placeholder="Ej: Calle 45 # 12-30, Bogotá" required />
      </div>
    </div>

    <div class="btn-actions">
      <button type="submit" class="btn btn-primary">📅 Reservar Cita</button>
      <a href="{{ url_for('index') }}" class="btn btn-secondary">← Volver</a>
    </div>
  </form>
</div>
{% endblock %}
